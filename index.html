<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clement Savel — Photographer</title>
  <meta name="description" content="Photography by Clement Savel. Download portfolio.">
  <meta property="og:title" content="Clement Savel — Photographer">
  <meta property="og:description" content="Photography by Clement Savel. Download portfolio.">
  <meta property="og:type" content="website">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="bg-layer" id="bg-a"></div>
  <div class="bg-layer" id="bg-b"></div>
  <div class="bg-overlay"></div>

  <main class="card-container">
    <div class="card">
      <h1 class="card__name">Clement Savel</h1>
      <p class="card__tagline">Photographer</p>
      <div class="card__divider"></div>
      <div class="card__downloads" id="downloads">
        <!-- Populated by JS from site.manifest.json -->
      </div>
      <div class="card__footer">
        <a href="mailto:contact@clementsavel.com">
          <svg class="card__footer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M22 4L12 13L2 4"/>
          </svg>
          Contact
        </a>
        <span class="card__footer-separator"></span>
        <a href="https://www.instagram.com/clementsavel/" target="_blank" rel="noopener noreferrer">
          <svg class="card__footer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5"/>
            <circle cx="12" cy="12" r="5"/>
            <circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
          Instagram
        </a>
      </div>
    </div>
  </main>

  <div class="bg-indicators" id="bg-indicators"></div>

  <script src="js/script.js"></script>
</body>
</html>
